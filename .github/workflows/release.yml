name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build and Upload Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scraper

      - name: Run tests
        run: npm test
        working-directory: scraper

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ingester dependencies
        run: python3 -m pip install -r ingester/requirements.txt pytest
        working-directory: .

      - name: Run ingester checks
        run: |
          python3 -m compileall -q ingester
          python3 -m pytest -q ingester/tests/test_qc_and_writer.py
        working-directory: .

      - name: Package binaries
        run: npm run package
        working-directory: scraper

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scraper/bin/evermind
            scraper/bin/evermind-linux-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
